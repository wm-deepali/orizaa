<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" preserveAspectRatio="xMidYMid meet">
  <g transform="rotate(-12, 100, 100)">
    <!-- Outermost thin gold ring -->
    <circle cx="100" cy="100" r="98" fill="none" stroke="#C8912A" stroke-width="2"/>
    <!-- Thick gold border -->
    <circle cx="100" cy="100" r="95" fill="#E8C080"/>
    <!-- Inner darker gold ring -->
    <circle cx="100" cy="100" r="82" fill="#D4A843"/>
    <!-- Brown center -->
    <circle cx="100" cy="100" r="78" fill="#8B5A2B"/>
    <!-- THANK -->
    <text x="100" y="82" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="bold" fill="white" letter-spacing="2">THANK</text>
    <!-- YOU -->
    <text x="100" y="112" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="bold" fill="white" letter-spacing="2">YOU</text>
    <!-- for YOUR -->
    <text x="100" y="134" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="white" letter-spacing="3">for YOUR</text>
    <!-- ORDER -->
    <text x="100" y="150" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="white" letter-spacing="3">ORDER</text>
  </g>
</svg>
